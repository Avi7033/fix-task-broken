artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache style access log and generate a JSON summary."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task only requires parsing a small Apache access log using the Python standard library and producing a simple JSON summary."
solution_explanation = "Parse the Apache access log, count the total requests, count unique client IP addresses, determine the most frequently requested path, and write the results to /app/report.json."
verification_explanation = "The verifier loads /app/report.json and validates the computed request count, unique IP count, and most requested path against the expected values."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

